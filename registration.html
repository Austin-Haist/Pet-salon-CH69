<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Pet Salon Registration</title>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand bg-white shadow-sm px-4">
        <a class="navbar-brand fw-bold" href="#">Pet Salon</a>
        <a class="nav-link" href="index.html">About Us</a>
        <a class="nav-link" href="#">Services</a>
        <a class="nav-link" href="registration.html">Registration</a>
    </nav>

    <main class="container mt-5">

        <section class="bg-white p-4 rounded shadow-sm mb-5">
            <h2 class="mb-3">Registered Pets</h2>
            <div id="pets"></div>
        </section>

        <section class="bg-white p-4 rounded shadow-sm">
            <h2 class="mb-4">Registration</h2>

            <form class="border rounded p-4 bg-light">

                <div class="mb-3">
                    <label class="form-label">Name</label>
                    <input class="form-control" type="text" id="petName" placeholder="Walter">
                </div>

                <div class="mb-3">
                    <label class="form-label">Age</label>
                    <input class="form-control" type="number" id="petAge" placeholder="7">
                </div>

                <div class="mb-3">
                    <label class="form-label">Breed</label>
                    <input class="form-control" type="text" id="petBreed" placeholder="Mixed">
                </div>

                <div class="mb-3">
                    <label class="form-label">Gender</label>
                    <select class="form-select" id="petGender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Service</label>
                    <select class="form-select" id="petService">
                        <option value="">Select service</option>
                        <option value="Grooming">Grooming</option>
                        <option value="Bath">Bath</option>
                        <option value="Nail Trim">Nail Trim</option>
                    </select>
                </div>

                <div class="text-end">
                    <button class="btn btn-primary" type="button">Register</button>
                    <button class="btn btn-secondary" type="reset">Reset</button>
                </div>

            </form>
        </section>

    </main>

    <script src="scripts/registration.js"></script>
</body>
</html>
