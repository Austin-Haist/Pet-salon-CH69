<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <title>Pet Salon Registration</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Pet Salon</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="index.html">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="registration.html">Registration</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="services.html">Services</a>
        </li>

      </ul>
    </div>
  </div>
</nav>
</body>

    <main class="container mt-5">

        <section class="bg-white p-4 rounded shadow-sm mb-5">

            <h2 class="mb-4">Registration</h2>

            <form class="border rounded p-4 bg-light">

                <div class="mb-3">
                    <label class="form-label" for="petName">
                        Name
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        id="petName"
                        placeholder="Walter">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="petAge">
                        Age
                    </label>

                    <input
                        class="form-control"
                        type="number"
                        id="petAge"
                        placeholder="7">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="petBreed">
                        Breed
                    </label>

                    <input
                        class="form-control"
                        type="text"
                        id="petBreed"
                        placeholder="Mixed">
                </div>

                <div class="mb-3">
                    <label class="form-label" for="petGender">
                        Gender
                    </label>

                    <select class="form-select" id="petGender">
                        <option value="">Select gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label" for="petService">
                        Service
                    </label>

                    <select class="form-select" id="petService">
                        <option value="">Select service</option>
                        <option value="Grooming">Grooming</option>
                        <option value="Bath">Bath</option>
                        <option value="Nail Trim">Nail Trim</option>
                        <option value="Ear Cleaning">Ear Cleaning</option>
                    </select>
                </div>

                <div class="text-end">

                    <button
                        class="btn btn-primary"
                        type="button"
                        onclick="registerPet()">
                        Register
                    </button>

                    <button
                        class="btn btn-secondary"
                        type="reset">
                        Reset
                    </button>

                </div>

            </form>

        </section>

        <section class="bg-white p-4 rounded shadow-sm">

            <h2 class="mb-4">Registered Pets</h2>

            <div class="table-responsive">

                <table class="table table-striped table-bordered">

                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Service</th>
                            <th>Breed</th>
                            <th>Delete</th>
                        </tr>
                    </thead>

                    <tbody id="petTableBody">

                    </tbody>

                </table>

            </div>

        </section>

    </main>

    <script src="scripts/registration.js"></script>

</body>
</html>
