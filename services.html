<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    


    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">
    <link rel="stylesheet" href="./styles/dark-mode.css">

    <title>Services</title>
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                Pet Salon
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="registration.html">
                            Registration
                        </a>
                    </li>

                    <li class="nav-item">
                        <a
                            class="nav-link active"
                            aria-current="page"
                            href="services.html">
                            Services
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

    <h1>Services </h1>

    <div class="m-5 d-flex justify-content-end">
        <button id="changeModeButton" class="btn btn-dark">🌙 Change Mode</button>
    </div>

    <form class="p-4 border rounded m-5" id="servicesForm">
      <div class="mb-3">
        <label class="form-label">Service</label>
        <input class="form-control" type="text" placeholder="Bath Basic" id="serviceName">
    </div>
      
    <div class="mb-4">
        <label class="form-label">Description</label>
        <input class="form-control" type="text" placeholder="Includes shampoo and towel dry" id="serviceDescription">
      </div>

      <div class="mb-3">
        <label class="form-label">Price</label>
        <input class="form-control" type="number" step="any" placeholder="10.99"  id="servicePrice">
      </div>

      <div class="d-flex justify-content-end gap-3">
        <button class="btn btn-primary" type="submit">Register</button>
        <button class="btn btn-secondary" type="reset">Reset</button>
      </div>

      </form>



    </main>


    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    
    <script src="./scripts/service.js"></script>
</body>
</html>
