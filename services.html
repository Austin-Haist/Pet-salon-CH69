<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link rel="stylesheet" href="./styles/dark-mode.css">
    <link rel="stylesheet" href="./styles/services.css">

    <title>Services</title>
</head>

<body>

    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary shadow-sm">
        <div class="container-fluid">

            <a class="navbar-brand" href="index.html">
                Papa's Paws and Tails
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="index.html">
                            Home
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="registration.html">
                            Registration
                        </a>
                    </li>

                    <li class="nav-item">
                        <a
                            class="nav-link active"
                            aria-current="page"
                            href="services.html">
                            Services
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>


    <main class="container mt-4">

        <!-- Services title and Change Mode button -->
        <div class="d-flex justify-content-between align-items-center mb-4">

            <h1 class="mb-0">Services</h1>

            <button
                id="changeModeButton"
                class="btn btn-dark"
                type="button">
                🌙 Change Mode
            </button>

        </div>


        <!-- Service Images -->
        <section class="row text-center g-4 mb-5">

            <div class="col-md-4">

                <div class="service-card">

                    <img
                        src="./images/bath.jpeg"
                        class="img-fluid rounded shadow service-image"
                        alt="Dog bath service">

                    <h2 class="h5 mt-3">
                        Bath
                    </h2>

                </div>

            </div>


            <div class="col-md-4">

                <div class="service-card">

                    <img
                        src="./images/nails.jpg"
                        class="img-fluid rounded shadow service-image"
                        alt="Dog nail trim service">

                    <h2 class="h5 mt-3">
                        Nail Trim
                    </h2>

                </div>

            </div>


            <div class="col-md-4">

                <div class="service-card">

                    <img
                        src="./images/paws.png"
                        class="img-fluid rounded shadow service-image"
                        alt="Dog paw cleaning service">

                    <h2 class="h5 mt-3">
                        Paw Cleaning
                    </h2>

                </div>

            </div>

        </section>


        <!-- Services Form -->
        <form class="p-4 border rounded mb-5" id="servicesForm">

            <div class="mb-3">

                <label class="form-label" for="serviceName">
                    Service
                </label>

                <select class="form-select" id="serviceName">

                    <option value="">
                        Select a service
                    </option>

                    <option value="Bath">
                        Bath
                    </option>

                    <option value="Nail Trim">
                        Nail Trim
                    </option>

                    <option value="Paw Cleaning">
                        Paw Cleaning
                    </option>

                </select>

            </div>


            <div class="mb-4">

                <label class="form-label" for="serviceDescription">
                    Description
                </label>

                <input
                    class="form-control"
                    type="text"
                    id="serviceDescription"
                    readonly>

            </div>


            <div class="mb-3">

                <label class="form-label" for="servicePrice">
                    Price
                </label>

                <input
                    class="form-control"
                    type="text"
                    id="servicePrice"
                    readonly>

            </div>


            <div class="d-flex justify-content-end gap-3">

                <button
                    class="btn btn-primary"
                    type="submit">
                    Register
                </button>

                <button
                    class="btn btn-secondary"
                    type="reset"
                    id="resetButton">
                    Reset
                </button>

            </div>

        </form>

    </main>


    <script
        src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
        crossorigin="anonymous">
    </script>

    <script src="./scripts/service.js"></script>

</body>
</html>
